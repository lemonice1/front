
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文件导入服务</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            min-height: 100vh;
            background: #0a0e1f;
            position: relative;
            overflow-x: hidden;
            color: #e0e6f0;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;

            background-image: linear-gradient(
                    rgba(5, 8, 20, 0.15),
                    rgba(5, 8, 20, 0.35)
            ),
            url('./img/a1.gif');

            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;

            filter: saturate(135%) contrast(115%) brightness(0.9);

            transform: scale(1.02);

            z-index: -2;
        }

        /* 霓虹光晕效果 */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(255, 0, 255, 0.15) 0%, transparent 50%),
            radial-gradient(circle at 80% 80%, rgba(0, 255, 255, 0.15) 0%, transparent 50%),
            radial-gradient(circle at 40% 20%, rgba(255, 0, 128, 0.1) 0%, transparent 50%);
            z-index: -1;
            animation: neonPulse 8s ease-in-out infinite alternate;
        }

        @keyframes neonPulse {
            0%, 100% {
                opacity: 0.6;
            }
            50% {
                opacity: 1;
            }
        }

        .container {
            width: 100%;
            max-width: 900px;
            margin: 40px auto;
            padding: 40px;

            background: rgba(5, 10, 25, 0.18);

            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);

            border: 1px solid rgba(255, 0, 255, 0.35);

            box-shadow: 0 0 25px rgba(255, 0, 255, 0.18),
            0 0 80px rgba(0, 255, 255, 0.06);

            position: relative;
            overflow: hidden;
            z-index: 10; /* 确保容器在枫叶上层 */
        }

        /* 角落装饰 */
        .container::before,
        .container::after {
            content: '';
            position: absolute;
            width: 30px;
            height: 30px;
            border: 3px solid #ff00ff;
        }

        .container::before {
            top: -3px;
            left: -3px;
            border-right: none;
            border-bottom: none;
        }

        .container::after {
            content: '';
            position: absolute;
            inset: 0;

            background: linear-gradient(
                    90deg,
                    transparent,
                    rgba(255, 0, 255, 0.05),
                    transparent
            );

            pointer-events: none;
        }

        h1 {
            font-family: 'Orbitron', monospace;
            text-align: center;
            font-size: 42px;
            font-weight: 900;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 40px;
            text-shadow: 0 0 10px #ff00ff,
            0 0 20px #ff00ff,
            0 0 40px #ff00ff,
            0 0 80px #ff00ff;
            position: relative;
            animation: glitchText 3s infinite;
        }

        @keyframes glitchText {
            0%, 90%, 100% {
                transform: translate(0);
            }
            92% {
                transform: translate(-2px, 2px);
            }
            94% {
                transform: translate(2px, -2px);
            }
            96% {
                transform: translate(-2px, -2px);
            }
            98% {
                transform: translate(2px, 2px);
            }
        }

        .upload-area {
            border: 2px solid rgba(0, 255, 255, 0.7);

            background: linear-gradient(
                    135deg,
                    rgba(0, 255, 255, 0.04),
                    rgba(255, 0, 255, 0.03)
            );

            backdrop-filter: blur(5px);

            padding: 50px;

            position: relative;

            transition: 0.35s;
        }

        .upload-area:hover {
            border-color: #ff00ff;

            background: rgba(255, 0, 255, 0.05);

            box-shadow: 0 0 40px rgba(255, 0, 255, 0.35),
            inset 0 0 20px rgba(255, 255, 255, 0.04);

            transform: translateY(-2px) scale(1.01);
        }

        .upload-area::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                    45deg,
                    transparent 30%,
                    rgba(0, 255, 255, 0.1) 50%,
                    transparent 70%
            );
            animation: scan 3s linear infinite;
        }

        @keyframes scan {
            0% {
                transform: translateY(-100%);
            }
            100% {
                transform: translateY(100%);
            }
        }

        .upload-icon {
            font-size: 56px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 20px #00ffff);
            animation: float 2s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        .upload-text {
            color: #00ffff;
            font-size: 18px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        .file-input {
            display: none;
        }

        .file-list {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .file-item {
            background: rgba(10, 14, 31, 0.9);
            border: 1px solid rgba(255, 0, 255, 0.3);
            padding: 25px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            transition: all 0.3s ease;
            clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);
            position: relative;
        }

        .file-item:hover {
            border-color: #00ffff;
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.4),
            inset 0 0 25px rgba(0, 255, 255, 0.05);
            transform: translateX(5px);
        }

        .file-info {
            display: flex;
            flex-direction: column;
            flex: 1;
            margin-right: 20px;
        }

        .file-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .file-name {
            font-family: 'Orbitron', monospace;
            font-weight: 700;
            color: #fff;
            font-size: 17px;
            text-shadow: 0 0 10px rgba(255, 0, 255, 0.5);
        }

        .file-size {
            font-size: 14px;
            color: #00ffff;
            font-weight: 500;
        }

        .status-badge {
            padding: 8px 16px;
            font-size: 13px;
            font-weight: 700;
            color: #fff;
            min-width: 90px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: 'Orbitron', monospace;
            clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px);
            position: relative;
        }

        .status-uploading {
            background: linear-gradient(135deg, #ff9500, #ff6600);
            box-shadow: 0 0 20px rgba(255, 149, 0, 0.6);
        }

        .status-processing {
            background: linear-gradient(135deg, #00bfff, #0080ff);
            box-shadow: 0 0 20px rgba(0, 191, 255, 0.6);
        }

        .status-completed {
            background: linear-gradient(135deg, #00ff88, #00cc66);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.6);
        }

        .status-error {
            background: linear-gradient(135deg, #ff0044, #cc0033);
            box-shadow: 0 0 20px rgba(255, 0, 68, 0.6);
        }

        .progress-wrapper {
            margin-top: 10px;
            display: none;
        }

        .progress-bar-container {
            width: 100%;
            height: 8px;
            background-color: rgba(10, 14, 31, 0.9);
            border: 1px solid rgba(255, 0, 255, 0.3);
            overflow: hidden;
            position: relative;
            clip-path: polygon(5px 0, 100% 0, 100% calc(100% - 5px), calc(100% - 5px) 100%, 0 100%, 0 5px);
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.4s;
            position: relative;
            overflow: hidden;
        }

        .progress-bar::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(
                    90deg,
                    rgba(255, 255, 255, 0) 0%,
                    rgba(255, 255, 255, 0.4) 50%,
                    rgba(255, 255, 255, 0) 100%
            );
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% {
                transform: translateX(-100%);
            }
            100% {
                transform: translateX(100%);
            }
        }

        .progress-text {
            font-size: 13px;
            color: #00ffff;
            margin-top: 8px;
            text-align: right;
            font-family: 'Orbitron', monospace;
            font-weight: 700;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        .log-details {
            margin-top: 18px;
            font-size: 14px;
            color: #c0c8d8;
            background: rgba(0, 255, 255, 0.03);
            border: 1px solid rgba(0, 255, 255, 0.2);
            padding: 18px 20px;
            clip-path: polygon(12px 0, 100% 0, 100% calc(100% - 12px), calc(100% - 12px) 100%, 0 100%, 0 12px);
        }

        .log-details summary {
            cursor: pointer;
            user-select: none;
            color: #ff00ff;
            outline: none;
            font-family: 'Orbitron', monospace;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 1px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 0, 255, 0.3);
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(255, 0, 255, 0.5);
        }

        .log-details[open] summary {
            margin-bottom: 6px;
        }

        .log-details summary:hover {
            color: #00ffff;
            text-shadow: 0 0 15px rgba(0, 255, 255, 0.8);
        }

        .log-details summary::marker {
            color: #ff00ff;
        }

        .log-list {
            margin: 10px 0 0 0;
            padding: 0 0 0 22px;
            list-style: none;
            max-height: 220px;
            overflow-y: auto;
            position: relative;
        }

        .log-list::before {
            content: "";
            position: absolute;
            left: 8px;
            top: 10px;
            bottom: 10px;
            width: 2px;
            background: linear-gradient(180deg, #ff00ff, #00ffff);
            box-shadow: 0 0 10px rgba(255, 0, 255, 0.5);
        }

        .log-list::-webkit-scrollbar {
            width: 8px;
        }

        .log-list::-webkit-scrollbar-track {
            background: rgba(10, 14, 31, 0.8);
            border: 1px solid rgba(255, 0, 255, 0.2);
        }

        .log-list::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #ff00ff, #00ffff);
            border-radius: 0;
        }

        .log-list::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, #00ffff, #ff00ff);
        }

        .log-list li {
            margin: 0;
            padding: 12px 14px;
            line-height: 1.6;
            display: flex;
            align-items: center;
            position: relative;
            border-radius: 0;
            transition: all 0.2s ease;
            font-family: 'Rajdhani', monospace;
        }

        .log-list li:hover {
            background: rgba(255, 0, 255, 0.05);
            transform: translateX(5px);
        }

        .log-list li::before {
            content: "";
            position: absolute;
            left: -18px;
            width: 12px;
            height: 12px;
            border: 2px solid #ff00ff;
            background: #0a0e1f;
            box-shadow: 0 0 10px rgba(255, 0, 255, 0.8);
            z-index: 1;
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
        }

        .log-done {
            color: #00ff88;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }

        .log-done::before {
            background: #00ff88 !important;
            border-color: #00ff88 !important;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.8) !important;
        }

        .log-duration {
            margin-left: auto;
            font-size: 13px;
            color: #00ffff;
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid rgba(0, 255, 255, 0.3);
            padding: 3px 14px;
            font-family: 'Orbitron', monospace;
            font-weight: 700;
            white-space: nowrap;
            clip-path: polygon(6px 0, 100% 0, 100% calc(100% - 6px), calc(100% - 6px) 100%, 0 100%, 0 6px);
            flex-shrink: 0;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        .log-running {
            color: #00bfff;
            animation: pulseText 1.5s infinite;
            text-shadow: 0 0 15px rgba(0, 191, 255, 0.8);
        }

        .log-running::before {
            background: #00bfff !important;
            border-color: #00bfff !important;
            box-shadow: 0 0 20px rgba(0, 191, 255, 1) !important;
            animation: pulseNode 1.5s infinite !important;
        }

        @keyframes pulseText {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.6;
            }
        }

        @keyframes pulseNode {
            0%, 100% {
                box-shadow: 0 0 20px rgba(0, 191, 255, 1);
            }
            50% {
                box-shadow: 0 0 30px rgba(0, 191, 255, 1), 0 0 40px rgba(0, 191, 255, 0.8);
            }
        }

        /* 扫描线效果 */
        @keyframes scanline {
            0% {
                transform: translateY(-100%);
            }
            100% {
                transform: translateY(100vh);
            }
        }

        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100px;
            background: linear-gradient(
                    to bottom,
                    transparent,
                    rgba(0, 255, 255, 0.1),
                    transparent
            );
            animation: scanline 8s linear infinite;
            pointer-events: none;
            z-index: 9999;
        }

        /* 新增枫叶飘落样式 */
        .maple-leaf {
            position: fixed;
            top: -10%;
            z-index: 5; /* 枫叶在背景之上，容器之下 */
            pointer-events: none; /* 不影响交互 */
            color: #e74c3c; /* 枫叶主色 */
            text-shadow: 0 0 10px rgba(231, 76, 60, 0.8);
            animation: fall linear infinite, sway ease-in-out infinite;
        }

        /* 枫叶飘落动画 */
        @keyframes fall {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }

        /* 枫叶摇摆动画 */
        @keyframes sway {
            0%, 100% {
                transform: translateX(0);
            }
            25% {
                transform: translateX(15px);
            }
            75% {
                transform: translateX(-15px);
            }
        }
    </style>
</head>

<body>


    <!-- 音乐播放器 -->
    <div
        id="gui-MusicPlayer"
        data-filePath="front"
        data-localMusic="playlistData.json"
        data-themeColor="gui-wineRed"
        data-random="true">

    </div>
    <link rel="stylesheet" href="./gui-MusicPlayer/icon/guiplayIcon.css">
    <!-- 引入播放器 -->

    <script src="./gui-MusicPlayer/js/gui-MusicPlayer.min.js"></script>

<div class="scanline"></div>

<div class="container">
    <h1>⚡  UPLOAD ⚡</h1>

    <div class="upload-area" id="dropZone" onclick="document.getElementById('fileInput').click()">
        <div class="upload-icon">🌃</div>
        <div class="upload-text">// 拖拽或点击上传文件 (PDF/MD) //</div>
        <input type="file" id="fileInput" class="file-input" accept=".pdf,.md">
    </div>

    <div id="fileList" class="file-list">
    </div>
</div>

<script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const fileList = document.getElementById('fileList');

    // 模拟后端API地址
    const API_BASE = 'http://127.0.0.1:8000';

    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.style.borderColor = '#ff00ff';
        dropZone.style.background = 'rgba(255, 0, 255, 0.15)';
    });

    dropZone.addEventListener('dragleave', (e) => {
        e.preventDefault();
        dropZone.style.borderColor = '';
        dropZone.style.background = '';
    });

    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.style.borderColor = '';
        dropZone.style.background = '';
        handleFiles(e.dataTransfer.files);
    });

    fileInput.addEventListener('change', (e) => {
        handleFiles(e.target.files);
    });

    function handleFiles(files) {
        Array.from(files).forEach(uploadFile);
    }

    function updateProgressUI(wrapper, percentage) {
        const bar = wrapper.querySelector('.progress-bar');
        const text = wrapper.querySelector('.progress-text');

        const safePercentage = Math.min(Math.max(percentage, 0), 100);

        bar.style.width = safePercentage + '%';
        text.textContent = Math.round(safePercentage) + '%';

        if (safePercentage >= 100) {
            bar.style.background = 'linear-gradient(90deg, #00ff88, #00cc66)';
            bar.style.boxShadow = '0 0 20px rgba(0, 255, 136, 0.8)';
        } else if (safePercentage < 10) {
            bar.style.background = 'linear-gradient(90deg, #ff9500, #ff6600)';
            bar.style.boxShadow = '0 0 20px rgba(255, 149, 0, 0.6)';
        } else {
            bar.style.background = 'linear-gradient(90deg, #00bfff, #0080ff)';
            bar.style.boxShadow = '0 0 20px rgba(0, 191, 255, 0.6)';
        }
    }

    async function uploadFile(file) {
        // === 核心逻辑优化：动态判断总节点数 ===
        const isPDF = file.name.toLowerCase().endsWith('.pdf');
        // PDF 需要 9 步（含上传），MD 跳过 pdf_to_md 需要 8 步
        const totalNodes = isPDF ? 8 : 7;

        const id = 'file-' + Math.random().toString(36).substr(2, 8);
        const html = `
            <div class="file-item" id="${id}">
                <div class="file-info">
                    <div class="file-header">
                        <span class="file-name">${file.name}</span>
                        <span class="file-size">${(file.size / 1024).toFixed(2)} KB</span>
                    </div>
                    <div class="progress-wrapper">
                        <div class="progress-bar-container">
                            <div class="progress-bar"></div>
                        </div>
                        <div class="progress-text">0%</div>
                    </div>
                    <details class="log-details" open>
                        <summary>> 初始化系统...</summary>
                        <ul class="log-list"></ul>
                    </details>
                </div>
                <div class="status-badge status-uploading">UPLOADING</div>
            </div>
        `;
        fileList.insertAdjacentHTML('afterbegin', html);

        const itemEl = document.getElementById(id);
        const statusBadge = itemEl.querySelector('.status-badge');
        const progressWrapper = itemEl.querySelector('.progress-wrapper');
        const logListEl = itemEl.querySelector('.log-list');

        const formData = new FormData();
        formData.append('file', file);

        try {
            progressWrapper.style.display = 'block';

            // 使用动态的 totalNodes 计算基础上传进度
            const uploadPercentage = (1 / totalNodes) * 100;
            updateProgressUI(progressWrapper, Math.min(uploadPercentage, 10));

            const initialLog = document.createElement('li');
            initialLog.textContent = ">>> 开始数据传输...";
            initialLog.className = "log-running";
            logListEl.appendChild(initialLog);

            const response = await fetch(`${API_BASE}/upload`, {
                method: 'POST',
                body: formData
            });

            if (!response.ok) throw new Error('Upload failed');

            const result = await response.json();
            const taskId = result.task_id;

            updateProgressUI(progressWrapper, uploadPercentage);
            statusBadge.textContent = 'PROCESSING';
            statusBadge.className = 'status-badge status-processing';

            // 把专属的 totalNodes 传给轮询函数
            pollStatus(taskId, itemEl, totalNodes);

        } catch (error) {
            console.error(error);
            statusBadge.textContent = 'FAILED';
            statusBadge.className = 'status-badge status-error';
            updateProgressUI(progressWrapper, 0);

            const errLog = document.createElement('li');
            errLog.textContent = "❌ 系统错误：网络连接失败";
            errLog.style.color = "#ff0044";
            errLog.style.textShadow = "0 0 10px rgba(255, 0, 68, 0.8)";
            logListEl.appendChild(errLog);
        }
    }

    function normalizeLogText(text) {
        if (typeof text !== 'string') return String(text);
        return text;
    }

    // 接收 totalNodes 参数计算最终百分比和渲染文案
    function formatDuration(seconds) {
        if (seconds < 60) {
            return seconds.toFixed(1) + 's';
        }
        const mins = Math.floor(seconds / 60);
        const secs = (seconds % 60).toFixed(0);
        return `${mins}m${secs}s`;
    }

    function renderLogsAndCalculateProgress(itemEl, doneList, runningList, totalNodes, durations) {
        const logSummary = itemEl.querySelector('.log-details summary');
        const logListEl = itemEl.querySelector('.log-list');

        const done = Array.isArray(doneList) ? doneList : [];
        const running = Array.isArray(runningList) ? runningList : [];
        const durationMap = durations || {};

        // === 进度计算逻辑 ===
        let currentPercentage = (done.length / totalNodes) * 100;

        if (running.length > 0) {
            currentPercentage += (0.5 / totalNodes) * 100;
        }

        if (currentPercentage >= 100) {
            currentPercentage = 95;
        }

        // 计算总耗时
        let totalDuration = 0;
        for (const key in durationMap) {
            totalDuration += durationMap[key];
        }
        const totalDurationText = totalDuration > 0 ? ` | 总耗时: ${formatDuration(totalDuration)}` : '';

        // 更新日志文案
        logSummary.textContent = `> 系统日志 [完成:${done.length}/${totalNodes}]${totalDurationText}`;

        logListEl.innerHTML = '';

        for (const item of done) {
            if (item === 'upload_file') continue;

            const li = document.createElement('li');
            const nameSpan = document.createElement('span');
            nameSpan.textContent = `[✓] ${normalizeLogText(item)} 模块执行完毕`;
            li.appendChild(nameSpan);

            // 添加耗时标签
            if (durationMap[item] !== undefined) {
                const durationSpan = document.createElement('span');
                durationSpan.className = 'log-duration';
                durationSpan.textContent = formatDuration(durationMap[item]);
                li.appendChild(durationSpan);
            }

            li.className = 'log-done';
            logListEl.appendChild(li);
        }

        for (const item of running) {
            const li = document.createElement('li');
            li.textContent = `>>> 正在处理 ${normalizeLogText(item)} 模块...`;
            li.className = 'log-running';
            logListEl.appendChild(li);
        }

        logListEl.scrollTop = logListEl.scrollHeight;

        return currentPercentage;
    }

    function pollStatus(taskId, itemEl, totalNodes) {
        const statusBadge = itemEl.querySelector('.status-badge');
        const progressWrapper = itemEl.querySelector('.progress-wrapper');
        const logDetails = itemEl.querySelector('.log-details');
        let stopped = false;

        const interval = setInterval(async () => {
            if (stopped) return;

            try {
                const res = await fetch(`${API_BASE}/status/${taskId}`);
                if (!res.ok) throw new Error('Status request failed');

                const data = await res.json();

                if (stopped) return;

                // 传入 totalNodes 继续计算
                const calculatedPercentage = renderLogsAndCalculateProgress(itemEl, data.done_list, data.running_list, totalNodes, data.durations);

                if (data.status === 'completed') {
                    stopped = true;
                    clearInterval(interval);
                    statusBadge.textContent = 'COMPLETE';
                    statusBadge.className = 'status-badge status-completed';
                    updateProgressUI(progressWrapper, 100);

                    setTimeout(() => {
                        logDetails.open = false;
                    }, 1000);

                } else if (data.status === 'failed') {
                    stopped = true;
                    clearInterval(interval);
                    statusBadge.textContent = 'ERROR';
                    statusBadge.className = 'status-badge status-error';

                    const logListEl = itemEl.querySelector('.log-list');
                    const errLog = document.createElement('li');
                    errLog.textContent = "❌ 致命错误：工作流执行中断";
                    errLog.style.color = "#ff0044";
                    errLog.style.textShadow = "0 0 10px rgba(255, 0, 68, 0.8)";
                    logListEl.appendChild(errLog);

                } else if (data.status === 'processing') {
                    updateProgressUI(progressWrapper, calculatedPercentage);
                }
            } catch (e) {
                console.error('Polling error', e);
            }
        }, 1500);
    }

    // 新增枫叶飘落逻辑
    function createMapleLeaf() {
        const leaf = document.createElement('div');
        leaf.className = 'maple-leaf';

        // 随机枫叶图标（可选：🍁 🍂 🍃）
        const leafIcons = ['🍁', '🍂'];
        leaf.textContent = leafIcons[Math.floor(Math.random() * leafIcons.length)];

        // 随机样式
        const size = Math.random() * 20 + 15; // 大小：15-35px
        leaf.style.fontSize = `${size}px`;
        leaf.style.left = `${Math.random() * 100}vw`; // 水平位置
        leaf.style.animationDuration = `${Math.random() * 15 + 10}s`; // 飘落时长：10-25s
        leaf.style.animationDelay = `${Math.random() * 5}s`; // 延迟：0-5s

        // 随机摇摆幅度
        leaf.style.animationName = `fall, sway${Math.floor(Math.random() * 3)}`;

        // 添加到页面
        document.body.appendChild(leaf);

        // 动画结束后移除元素
        setTimeout(() => {
            leaf.remove();
        }, 30000); // 30秒后移除（大于最大动画时长）
    }

    // 批量创建枫叶
    function startMapleLeafFall() {
        // 初始创建一批
        for (let i = 0; i < 5; i++) {
            createMapleLeaf();
        }

        // 定时创建新枫叶
        setInterval(() => {
            createMapleLeaf();
        }, 2000); // 每2秒创建一片
    }

    // 页面加载后启动枫叶飘落
    window.addEventListener('load', startMapleLeafFall);
</script>
